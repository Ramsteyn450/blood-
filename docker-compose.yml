version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=your_mongodb_connection_string_here
      - JWT_SECRET=your_jwt_secret_here
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5000
    restart: always
